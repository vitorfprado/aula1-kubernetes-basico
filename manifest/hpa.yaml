apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aula-k8s-hpa
  namespace: aula-k8s
  labels:
    app: aula-k8s
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aula-k8s-deployment
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
