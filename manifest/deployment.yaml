apiVersion: apps/v1
kind: Deployment
metadata:
  name: aula-k8s-deployment
  namespace: aula-k8s
  labels:
    app: aula-k8s
spec:
  replicas: 3
  selector:
    matchLabels:
      app: aula-k8s
  template:
    metadata:
      labels:
        app: aula-k8s
    spec:
      containers:
        - name: hello-app
          image: vitorfprado/aula1-dataside-lab:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: aula-k8s-config
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "300m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /
              port: 3000
            failureThreshold: 30
            periodSeconds: 2
