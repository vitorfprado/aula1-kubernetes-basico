apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: exemplo-hpa
  namespace: aula-k8s
  labels:
    app: exemplo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: exemplo-deployment
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
